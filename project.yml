name: JOSIE
options:
  bundleIdPrefix: com.kiwisingh
targets:
  JOSIE:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - JOSIEApp
      - path: JOSIEApp/Assets.xcassets # CRUCIAL: This tells Xcode to actually include your icons
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.kiwisingh.josie
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSMicrophoneUsageDescription: "JOSIE needs the mic to hear you."
      INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "JOSIE uses speech recognition to understand you."
      INFOPLIST_KEY_UIFileSharingEnabled: YES
      INFOPLIST_KEY_UISupportsDocumentBrowser: YES
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
