name: Build JOSIE Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Vulkan Shader Compiler
      # Installs the required shader tools so Ubuntu can compile your .comp files
      run: sudo apt-get update && sudo apt-get install -y glslang-tools glslc libvulkan-dev

    - name: Inject Vulkan C++ Headers into Android NDK
      run: |
        # 1. Force the Android SDK Manager to download the NDK so the folder actually exists
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"
        
        # 2. Download the official Vulkan C++ headers
        git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git
        
        # 3. Create the missing Vulkan directory just to be safe
        sudo mkdir -p $ANDROID_HOME/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/vulkan
        
        # 4. Forcefully copy the C++ headers into the NDK's isolated sysroot folder
        sudo cp -a Vulkan-Headers/include/vulkan/* $ANDROID_HOME/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/vulkan/

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        # Decode the Base64 string back into a binary file inside the app folder
        echo $ENCODED_STRING | base64 -di > JOSIEApp-Android/app/kiwi.jks

    - name: Build Signed Release APK
      env:
        KEYSTORE_PATH: "kiwi.jks"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GLSLC_PATH: "/usr/bin/glslc"
      run: |
        cd JOSIEApp-Android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: JOSIE-v1.1-Android
        path: JOSIEApp-Android/app/build/outputs/apk/release/app-release.apk