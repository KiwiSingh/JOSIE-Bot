name: Build JOSIE Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        submodules: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install NDK, Vulkan Headers, and glslc
      run: |
        sudo apt-get update && sudo apt-get install -y libvulkan-dev

        # Install NDK
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"

        # Inject Vulkan C++ headers into the NDK sysroot
        git clone --depth 1 https://github.com/KhronosGroup/Vulkan-Headers.git
        sudo mkdir -p $ANDROID_HOME/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include
        sudo cp -a Vulkan-Headers/include/* $ANDROID_HOME/ndk/25.1.8937393/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/

        # Use glslc bundled with the NDK — no external downloads needed
        NDK_GLSLC="$ANDROID_HOME/ndk/25.1.8937393/shader-tools/linux-x86_64/glslc"
        echo "GLSLC_PATH=$NDK_GLSLC" >> $GITHUB_ENV

        # Hard-fail if glslc is missing so we don't get a silent bad build
        $NDK_GLSLC --version

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        # Decode the Base64 string back into a binary file inside the app folder
        echo $ENCODED_STRING | base64 -di > JOSIEApp-Android/app/kiwi.jks

    - name: Build Signed Release APK
      env:
        KEYSTORE_PATH: "kiwi.jks"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # GLSLC_PATH is set dynamically in the previous step via $GITHUB_ENV
      run: |
        cd JOSIEApp-Android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: JOSIE-v1.1-Android
        path: JOSIEApp-Android/app/build/outputs/apk/release/app-release.apk
