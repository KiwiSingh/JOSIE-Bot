# J.O.S.I.E. iOS Cloud Build Configuration
workflows:
  ios-josie-build:
    name: JOSIE iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    working_directory: .
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen and Generate Project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Install Swift Package Dependencies
        script: |
          xcodebuild -resolvePackageDependencies -project JOSIE.xcodeproj -scheme JOSIE
      - name: Build J.O.S.I.E. (Debug)
        script: |
          xcodebuild build \
            -project JOSIE.xcodeproj \
            -scheme JOSIE \
            -sdk iphoneos \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY=""
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - kiwisingh@proton.me
        notify:
          success: true
          failure: true
