workflows:
  ios-josie-build:
    name: JOSIE iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Generate Project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Metal & Deps
        script: |
          xcodebuild -downloadComponent MetalToolchain
          xcodebuild -resolvePackageDependencies -project JOSIE.xcodeproj -scheme JOSIE
      - name: Build
        script: |
          xcodebuild build \
            -project JOSIE.xcodeproj -scheme JOSIE -sdk iphoneos -configuration Debug \
            -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphoneos/*.app
    publishing:
      email:
        recipients:
          - kiwisingh@proton.me
