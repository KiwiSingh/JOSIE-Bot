name: Build JOSIE Linux (v1.1)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      # Linux requires these C-libraries to compile Tkinter UI and PyAudio
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk portaudio19-dev libasound2-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests Pillow edge-tts SpeechRecognition PyAudio --prefer-binary

    - name: Build Standalone Binary
      run: |
        # Note the colon ":" in the add-data flag. Linux uses colons for path separation!
        pyinstaller --noconsole --onefile --add-data "josie_avatar.png:." --clean josie.py
        
        # Rename the output binary
        mv dist/josie dist/JOSIE

    - name: Create Linux Installer and Desktop File
      run: |
        cd dist
        
        # 1. Create the .desktop file (This is what makes it show up in the App Launcher)
        cat << 'EOF' > JOSIE.desktop
        [Desktop Entry]
        Name=JOSIE AI
        Comment=Just One Sexually Involved E-girl
        Exec=/opt/JOSIE/JOSIE
        Icon=/opt/JOSIE/josie_avatar.png
        Terminal=false
        Type=Application
        Categories=Utility;
        EOF
        
        # 2. Copy the icon into the dist folder so it can be installed
        cp ../josie_avatar.png .
        
        # 3. Create a quick install script so the user doesn't have to manually place files
        cat << 'EOF' > install.sh
        #!/bin/bash
        echo "Installing JOSIE AI..."
        sudo mkdir -p /opt/JOSIE
        sudo cp JOSIE /opt/JOSIE/
        sudo cp josie_avatar.png /opt/JOSIE/
        sudo chmod +x /opt/JOSIE/JOSIE
        
        mkdir -p ~/.local/share/applications
        cp JOSIE.desktop ~/.local/share/applications/
        
        echo "✅ JOSIE installed! You can now launch her from your app menu."
        EOF
        
        chmod +x install.sh
        
        # 4. Package it all into a clean tarball
        tar -czvf JOSIE-v1.1-Linux.tar.gz JOSIE JOSIE.desktop josie_avatar.png install.sh

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JOSIE-v1.1-Linux
        path: dist/JOSIE-v1.1-Linux.tar.gz
